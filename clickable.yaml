clickable_minimum_required: 8.8.0
framework: ubuntu-sdk-20.04
builder: pure-qml-cmake
kill: qmlscene
dependencies_target:
  - python3-cryptography
  - python3-qrcode
  - python3-urllib3
env_vars:
  UV_INSTALL_DIR: /usr/local
  # Note: these apply in the Clickable *build* container. `clickable desktop` sets
  # CLICKABLE_DESKTOP_MODE=1 on the app process — discord_client.dev_flags() uses that
  # to skip the offline gate. To force the gate on desktop: DISPORTS_IGNORE_CONNECTIVITY=0 clickable desktop
image_setup:
  run:
    - curl -LsSf https://astral.sh/uv/install.sh | sh
postbuild:
  - /usr/bin/bash install/build-python-deps.sh
