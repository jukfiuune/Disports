name: Build Disports

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.github/workflows/release.yaml'
  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Clickable
        uses: actions/cache@v4
        with:
          path: |
            .clickable
            build
          key: ${{ runner.os }}-clickable-${{ hashFiles('clickable.yaml', 'requirements.txt', 'CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-clickable-

      - name: Build
        run: |
          docker run \
            --rm \
            --env UV_INSTALL_DIR=/usr/local \
            --volume ./:/app \
            clickable/ci-ut24.04-1.x-arm64:latest \
            bash -c "cd /app && clickable build"

      - name: Sanitize artifact name
        run: echo "SAFE_REF_NAME=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_ENV

      - name: Upload click package
        uses: actions/upload-artifact@v4
        with:
          name: disports-${{ env.SAFE_REF_NAME }}-${{ github.sha }}
          path: build/all/app/*.click
          retention-days: 30
