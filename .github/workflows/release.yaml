name: Release Disports

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull Clickable
        run: |
          docker pull clickable/ci-ut24.04-1.x-arm64:latest

      - name: Build
        run: |
          docker run \
            --env UV_INSTALL_DIR=/usr/local \
            --volume ./:/app \
            clickable/ci-ut24.04-1.x-arm64:latest \
            bash -c "cd /app && clickable build --arch arm64"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Disports ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: build/aarch64-linux-gnu/app/*.click
